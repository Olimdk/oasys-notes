<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OASYS Notes</title>
<link rel="stylesheet" href="/src/style.css" />
</head>
<body>
<header>
  <strong class="brand">◯◯◯ OASYS Notes</strong>
  <button id="openBtn">Open Vault</button>
  <input id="search" placeholder="search notes…" />
  <span class="spacer"></span>
  <button id="newBtn">+ New</button>
  <button id="graphBtn">Graph</button>
  <button id="syncBtn">Sync</button>
</header>
<main>
  <aside id="tree"></aside>
  <section id="content">
    <input id="title" placeholder="note title" disabled />
    <div id="props" class="props"></div>
    <div id="editor" contenteditable="true" spellcheck="false"></div>
    <div id="backlinks"></div>
  </section>
  <canvas id="graph" hidden></canvas>
</main>
<div id="ctxMenu" class="ctx-menu" hidden></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
